services:
  postgres:
    image: postgres:16-alpine
    container_name: boveda-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boveda
    ports:
      - "5432:5432"
    volumes:
      - boveda_pg_data:/var/lib/postgresql/data

volumes:
  boveda_pg_data:
